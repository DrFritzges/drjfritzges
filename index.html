<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Jessica Fritzges | Licensed Psychologist</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * { transition: all 0.2s ease-in-out; }

</head>
<body class="bg-[#F9F8F6] text-[#2C2A29] font-sans antialiased selection:bg-[#EAE6E1]">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-[#F9F8F6]/90 backdrop-blur-md border-b border-[#EAE6E1]">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="#" class="text-lg font-medium tracking-tight">Dr. Jessica Fritzges</a>
            <div class="hidden md:flex items-center space-x-8 text-sm font-medium text-gray-600">

    <section class="max-w-4xl mx-auto px-6 py-20 text-center">

        <a href="#contact" class="bg-[#2C2A29] text-[#F9F8F6] px-8 py-3 rounded-full">Schedule</a>

    <!-- Services Section -->
    <section id="services" class="max-w-6xl mx-auto px-6 py-20">
        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-2xl border border-[#EAE6E1]">
